music_directory     "/mnt/kerby/music"
playlist_directory  "~/.local/share/mpd/playlists"
db_file             "~/.local/share/mpd/mpd.db"
state_file          "~/.local/share/mpd/mpdstate"
sticker_file        "~/.local/share/mpd/sticker.sql"

# bind_to_address intentionally omitted: mpd.socket (systemd socket
# activation) hands mpd its listening socket(s) directly.

log_file       "syslog"
restore_paused "yes"

audio_output {
    type "pipewire"
    name "PipeWire"
}

audio_output {
    type   "fifo"
    name   "cava"
    path   "/run/user/1000/mpd-cava.fifo"
    format "44100:16:2"
}

# CIFS mount (/mnt/kerby) doesn't support inotify, so filesystem
# auto-update is off. DB refresh is handled by mpd-update.timer
# running `mpc update` hourly instead.
auto_update "no"
